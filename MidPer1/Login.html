<!DOCTYPE html>
<html>
<head>
	<title>Login Page</title>
	<style>
		 body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

		 .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 25%;
            background: #222;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }
        .sidebar h2 {
            text-align: center;
            margin-bottom: 40px;
        }
        .sidebar button {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: blue;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
          .sidebar button:hover {
            background: #45a049;
        }
        .content {
            width: 75%;
            padding: 50px;
            background: #f4f4f4;
            box-sizing: border-box;
        }
        .login-box {
            width: 300px;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .login-box h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: #222;
            color: white;
            border: none;
            cursor: pointer;
        }

        .login-box button:hover {
            background: black;

        }

	</style>
</head>
<body>
	<div class = "container">
		 <div class="sidebar">
	<h1>TechFlow</h1>
	<button class="login-btn">Login</button>
	<br>
	<button>Registration</button>
</div>



<div class="content">
        <div class="login-box">
	<h2>Login</h2>
	<label>Email Address</label>
	<br>
	<input type ="email">
	<br>
	<label>Password</label>
	<br>
	<input type ="password">
	<br>
	<button type="submit">Sign In</button>
	</div>
	 <div class="box" id="register-box">
            <h2>Create Account</h2>
            <label>Email Address</label>
            <br>
            <input type="email" >
            <br>
            <label>Password</label>
            <br>
            <input type="password">
            <br>
             <select>
                <option>Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                 </select>
                 <br>
                 <button>Register</button>
        </div>
                
    </div>
</div>

</body>
</html>
